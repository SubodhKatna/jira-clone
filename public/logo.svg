<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#091E42" flood-opacity="0.2" />
        </filter>

        <linearGradient id="blueGrad" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0052CC" />
            <stop offset="100%" stop-color="#2684FF" />
        </linearGradient>

        <linearGradient id="orangeGrad" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#DE350B" />
            <stop offset="100%" stop-color="#FF5630" />
        </linearGradient>

        <linearGradient id="greenGrad" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#006644" />
            <stop offset="100%" stop-color="#36B37E" />
        </linearGradient>

        <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5243AA" />
            <stop offset="100%" stop-color="#8777D9" />
        </linearGradient>
    </defs>

    <circle cx="256" cy="256" r="32" fill="url(#coreGrad)" filter="url(#shadow)" />

    <g>
        <path d="M 256 76 A 180 180 0 1 1 76 256" fill="none" stroke="url(#blueGrad)" stroke-width="24" stroke-linecap="round" />
        <circle cx="76" cy="256" r="20" fill="#FFFFFF" stroke="#2684FF" stroke-width="8" filter="url(#shadow)" />
    </g>

    <g transform="rotate(120 256 256)">
        <path d="M 256 126 A 130 130 0 1 1 126 256" fill="none" stroke="url(#orangeGrad)" stroke-width="24" stroke-linecap="round" />
        <circle cx="126" cy="256" r="20" fill="#FFFFFF" stroke="#FF5630" stroke-width="8" filter="url(#shadow)" />
    </g>

    <g transform="rotate(240 256 256)">
        <path d="M 256 176 A 80 80 0 1 1 176 256" fill="none" stroke="url(#greenGrad)" stroke-width="24" stroke-linecap="round" />
        <circle cx="176" cy="256" r="20" fill="#FFFFFF" stroke="#36B37E" stroke-width="8" filter="url(#shadow)" />
    </g>
</svg>
